[tools]
# Runtime & package managers
node = "24"
pnpm = "10"
uv = "0.11"

# Linters & formatters
biome = "2"
shellcheck = "0.11"
shfmt = "3"
taplo = "0.10"
"npm:markdownlint-cli2" = "0.21"
"pipx:yamllint" = "1"
yamlfmt = "0.21"
actionlint = "1"
gitleaks = "8"
trivy = "0.69"
"pipx:mdformat" = "0.7"

# CLI utilities for AI-assisted development
ast-grep = "0.42"
yq = "4"
just = "1"
zoxide = "0.9"

# Testing
"npm:bats" = "1"

# Git hooks & commit conventions
lefthook = "2"
"npm:@commitlint/cli" = "20"
"npm:@commitlint/config-conventional" = "20"
