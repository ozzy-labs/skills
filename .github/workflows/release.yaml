name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # A release PR opened by the default GITHUB_TOKEN does NOT trigger CI
          # (GitHub suppresses workflow events raised by GITHUB_TOKEN), so the
          # required `lint-and-build` status check never appears and the
          # `main-protection` ruleset keeps every release PR permanently BLOCKED.
          # Passing a non-default token makes the release PR trigger CI so it can
          # satisfy the required check: set RELEASE_PLEASE_TOKEN to a fine-grained
          # PAT, or mint a GitHub App token in-workflow and reference it here (App
          # tokens are per-run and cannot be stored as a static secret — see
          # docs/releasing.md). Falls back to GITHUB_TOKEN when the secret is
          # absent (unchanged behaviour — first release is manual).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISE_DISABLE_TOOLS: trivy

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install latest npm (>= 11.5.1 required for trusted publishing)
        run: npm install -g npm@latest

      - name: pnpm cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
